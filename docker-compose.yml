services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: termo
      POSTGRES_PASSWORD: termo
      POSTGRES_DB: termo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U termo -d termo"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ~/data/smart-tech-termo/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: [internal]

  api:
    build: { context: ., dockerfile: Dockerfile.api }
    env_file: .env
    environment:
      # Sobrescreve DATABASE_URL do .env para usar o hostname interno do Docker
      DATABASE_URL: postgresql://termo:termo@postgres:5432/termo
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "3001:3001"
    networks: [internal]

  nginx:
    build: { context: ., dockerfile: Dockerfile.nginx }
    ports: ["8095:80"]
    depends_on: [api]
    networks: [internal]

networks:
  internal:
